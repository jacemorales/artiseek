<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | CryptoVerse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="dashboard.html">CryptoVerse</a>
            </div>
            <div class="user-nav">
                <button class="user-balance" id="user-nav-balance">
                    <!-- Balance will be inserted by JS -->
                </button>
                <div class="user-dropdown" id="user-dropdown" style="display: none;">
                    <p class="dropdown-header" id="dropdown-fullname"></p>
                    <p class="dropdown-email" id="dropdown-email"></p>
                    <hr>
                    <button id="logout-btn" class="logout-button">Logout</button>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="dashboard-chart">
            <div class="chart-header">
                <h2>Market Overview</h2>
                <div class="chart-toggle">
                    <button id="line-chart-btn" class="toggle-btn active" title="Line Chart">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"></path></svg>
                    </button>
                    <button id="bar-chart-btn" class="toggle-btn" title="Candlestick Chart">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M8 4h2v16H8zm6 2h2v12h-2zM4 10h2v10H4zm12 2h2v4h-2z"></path></svg>
                    </button>
                </div>
            </div>
            <div id="chart-title-container">
                <h3 id="chart-title"></h3>
                <p id="chart-subtitle"></p>
            </div>
            <div id="chart-container">
                <!-- Chart will be rendered here -->
            </div>
            <div class="investment-info">
                <p>Investment Balance: <span id="investment-balance">$0</span></p>
                <button id="withdraw-btn" class="cta-button">Withdraw Investment</button>
            </div>
        </section>

        <section id="market" class="crypto-market">
            <h2>Live Market</h2>
            <div class="market-container">
                <!-- Crypto cards will be inserted here by JavaScript -->
            </div>
        </section>
    </main>

    <!-- Investment Modal -->
    <div id="invest-modal" class="modal" style="display:none;">
        <div class="modal-content" id="invest-modal-content">
            <!-- New investment form will be injected here -->
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
