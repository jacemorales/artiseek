<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | CryptoVerse</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="dashboard.html">CryptoVerse</a>
            </div>
            <div class="user-nav">
                <button class="user-balance" id="user-nav-balance">
                    <!-- Balance will be inserted by JS -->
                </button>
                <div class="user-dropdown" id="user-dropdown" style="display: none;">
                    <p class="dropdown-header" id="dropdown-fullname"></p>
                    <p class="dropdown-email" id="dropdown-email"></p>
                    <hr>
                    <button id="top-up-btn" class="top-up-button">Top Up</button>
                    <button id="logout-btn" class="logout-button">Logout</button>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="dashboard-chart">
            <div class="chart-header">
                <h2>Portfolio Overview</h2>
            </div>
            <div id="chart-title-container">
                <h3 id="chart-title"></h3>
                <p id="chart-subtitle"></p>
            </div>
            <div id="chart-container">
                <!-- Chart will be rendered here -->
            </div>
            <div class="investment-info">
                <p>Investment Balance: <span id="investment-balance">$0</span></p>
            </div>
        </section>

        <section id="investments" class="user-investments">
            <h2>Your Investments</h2>
            <div id="investments-list-container">
                <!-- Investment cards will be rendered here -->
            </div>
        </section>

        <section id="market" class="crypto-market">
            <h2>Live Market</h2>
            <div class="market-container">
                <!-- Crypto cards will be inserted here by JavaScript -->
            </div>
        </section>
    </main>

    <!-- Investment Modal -->
    <div id="invest-modal" class="modal" style="display:none;">
        <div class="modal-content" id="invest-modal-content">
            <!-- New investment form will be injected here -->
        </div>
    </div>

    <!-- Top Up Modal -->
    <div id="top-up-modal" class="modal" style="display:none;">
        <div class="modal-content" id="top-up-modal-content">
            <!-- Top up form will be injected here -->
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
